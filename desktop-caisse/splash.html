<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="Content-Security-Policy" content="default-src 'self' 'unsafe-inline'">
  <title>Family Store</title>
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    html, body {
      width: 480px;
      height: 300px;
      overflow: hidden;
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      user-select: none;
      -webkit-app-region: drag;
    }

    body {
      background: linear-gradient(145deg, #6B1829 0%, #4A0F1A 100%);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      color: #fff;
      position: relative;
    }

    /* Motif subtil en arrière-plan */
    body::before {
      content: '';
      position: absolute;
      inset: 0;
      background-image: radial-gradient(circle at 20% 80%, rgba(255,255,255,0.03) 0%, transparent 50%),
                        radial-gradient(circle at 80% 20%, rgba(255,255,255,0.04) 0%, transparent 40%);
      pointer-events: none;
    }

    .logo-wrap {
      width: 72px;
      height: 72px;
      background: rgba(255, 255, 255, 0.10);
      border: 1.5px solid rgba(255, 255, 255, 0.18);
      border-radius: 20px;
      display: flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 18px;
      box-shadow: 0 8px 24px rgba(0,0,0,0.3), inset 0 1px 0 rgba(255,255,255,0.1);
    }

    .logo-text {
      font-size: 26px;
      font-weight: 900;
      letter-spacing: -1.5px;
      color: #fff;
      line-height: 1;
    }

    h1 {
      font-size: 26px;
      font-weight: 700;
      letter-spacing: -0.5px;
      color: #fff;
      margin-bottom: 5px;
    }

    .subtitle {
      font-size: 11px;
      font-weight: 600;
      color: rgba(255, 255, 255, 0.45);
      letter-spacing: 0.18em;
      text-transform: uppercase;
      margin-bottom: 36px;
    }

    /* Spinner de chargement */
    .spinner {
      width: 24px;
      height: 24px;
      border: 2.5px solid rgba(255, 255, 255, 0.15);
      border-top-color: rgba(255, 255, 255, 0.8);
      border-radius: 50%;
      animation: spin 0.75s linear infinite;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    .version {
      position: absolute;
      bottom: 14px;
      font-size: 10px;
      color: rgba(255, 255, 255, 0.22);
      letter-spacing: 0.06em;
    }
  </style>
</head>
<body>
  <div class="logo-wrap">
    <span class="logo-text">FS</span>
  </div>
  <h1>Family Store</h1>
  <p class="subtitle">Point de Vente &middot; Caisse</p>
  <div class="spinner"></div>
  <span class="version">v1.0.0</span>
</body>
</html>
