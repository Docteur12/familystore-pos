<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="Content-Security-Policy" content="default-src 'self' 'unsafe-inline'">
  <title>Family Store — Hors ligne</title>
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    html, body {
      height: 100%;
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      user-select: none;
    }

    body {
      background: #F5F0E8;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      color: #1A1A1A;
    }

    /* En-tête marque */
    .brand {
      position: fixed;
      top: 24px;
      left: 32px;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .brand-badge {
      width: 36px;
      height: 36px;
      background: #7A1D2E;
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #fff;
      font-size: 13px;
      font-weight: 900;
      letter-spacing: -0.5px;
    }

    .brand-name {
      font-size: 16px;
      font-weight: 700;
      color: #3D1818;
      letter-spacing: -0.3px;
    }

    /* Carte d'erreur */
    .card {
      background: #fff;
      border-radius: 20px;
      padding: 52px 60px;
      box-shadow: 0 4px 32px rgba(0, 0, 0, 0.07), 0 1px 4px rgba(0,0,0,0.04);
      text-align: center;
      max-width: 460px;
      width: 90%;
    }

    .icon-wrap {
      width: 68px;
      height: 68px;
      background: #FEF2F2;
      border-radius: 18px;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 22px;
    }

    h2 {
      font-size: 21px;
      font-weight: 700;
      color: #111;
      margin-bottom: 10px;
      letter-spacing: -0.3px;
    }

    p {
      font-size: 14px;
      color: #6B6B6B;
      line-height: 1.65;
      margin-bottom: 32px;
    }

    .btn-retry {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: #7A1D2E;
      color: #fff;
      border: none;
      border-radius: 11px;
      padding: 13px 36px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      letter-spacing: 0.02em;
      transition: background 0.15s, transform 0.1s;
      outline: none;
    }

    .btn-retry:hover  { background: #9B2436; }
    .btn-retry:active { background: #5C1627; transform: scale(0.98); }

    .btn-retry svg {
      flex-shrink: 0;
      animation: none;
    }

    .btn-retry.loading svg {
      animation: spin 0.7s linear infinite;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    /* Pied de page */
    footer {
      position: fixed;
      bottom: 20px;
      font-size: 11px;
      color: #BDB5A8;
      letter-spacing: 0.04em;
    }
  </style>
</head>
<body>

  <div class="brand">
    <div class="brand-badge">FS</div>
    <span class="brand-name">Family Store</span>
  </div>

  <div class="card">
    <div class="icon-wrap">
      <!-- Icône WiFi barré -->
      <svg width="34" height="34" viewBox="0 0 24 24" fill="none"
           stroke="#EF4444" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round">
        <line x1="1" y1="1" x2="23" y2="23"/>
        <path d="M16.72 11.06A10.94 10.94 0 0 1 19 12.55"/>
        <path d="M5 12.55a10.94 10.94 0 0 1 5.17-2.39"/>
        <path d="M10.71 5.05A16 16 0 0 1 22.56 9"/>
        <path d="M1.42 9a15.91 15.91 0 0 1 4.7-2.88"/>
        <path d="M8.53 16.11a6 6 0 0 1 6.95 0"/>
        <line x1="12" y1="20" x2="12.01" y2="20"/>
      </svg>
    </div>

    <h2>Connexion impossible</h2>
    <p>
      Vérifiez votre connexion internet.<br>
      L'application nécessite un accès réseau pour fonctionner.
    </p>

    <button class="btn-retry" id="retryBtn" onclick="retry()">
      <!-- Icône refresh -->
      <svg width="15" height="15" viewBox="0 0 24 24" fill="none"
           stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M3 12a9 9 0 0 1 9-9 9.75 9.75 0 0 1 6.74 2.74L21 8"/>
        <path d="M21 3v5h-5"/>
        <path d="M21 12a9 9 0 0 1-9 9 9.75 9.75 0 0 1-6.74-2.74L3 16"/>
        <path d="M8 16H3v5"/>
      </svg>
      Réessayer
    </button>
  </div>

  <footer>Family Store POS &mdash; by RDCT</footer>

  <script>
    let retrying = false;

    function retry() {
      if (retrying) return;
      retrying = true;

      const btn = document.getElementById('retryBtn');
      btn.classList.add('loading');
      btn.disabled = true;
      btn.textContent = '';

      // Spinner SVG inline pendant le chargement
      btn.innerHTML = `
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none"
             stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M3 12a9 9 0 0 1 9-9 9.75 9.75 0 0 1 6.74 2.74L21 8"/>
          <path d="M21 3v5h-5"/>
          <path d="M21 12a9 9 0 0 1-9 9 9.75 9.75 0 0 1-6.74-2.74L3 16"/>
          <path d="M8 16H3v5"/>
        </svg>
        Connexion en cours…
      `;

      if (window.electronAPI) {
        // Déléguer la vérification au processus principal
        window.electronAPI.retry();
        // Si toujours sur cette page après 5s → réactiver le bouton
        setTimeout(() => resetBtn(), 5000);
      } else {
        // Fallback navigateur (dev sans Electron)
        setTimeout(() => window.location.reload(), 1500);
      }
    }

    function resetBtn() {
      retrying = false;
      const btn = document.getElementById('retryBtn');
      btn.classList.remove('loading');
      btn.disabled = false;
      btn.innerHTML = `
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none"
             stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M3 12a9 9 0 0 1 9-9 9.75 9.75 0 0 1 6.74 2.74L21 8"/>
          <path d="M21 3v5h-5"/>
          <path d="M21 12a9 9 0 0 1-9 9 9.75 9.75 0 0 1-6.74-2.74L3 16"/>
          <path d="M8 16H3v5"/>
        </svg>
        Réessayer
      `;
    }
  </script>

</body>
</html>
