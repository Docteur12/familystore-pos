[build]
  base    = "frontend"
  command = "npm run build"
  publish = "dist"

# Proxy /api/* → Render backend (transparent, pas de redirect visible)
[[redirects]]
  from   = "/api/*"
  to     = "https://familystore-api.onrender.com/api/:splat"
  status = 200
  force  = true

# SPA fallback : toutes les routes React → index.html
[[redirects]]
  from   = "/*"
  to     = "/index.html"
  status = 200
